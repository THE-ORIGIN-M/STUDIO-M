<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO M // Underground Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Urbanist:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --panel: #0d0d12;
            --border: #1a1a24;
            --text: #ffffff;
            --text-muted: #8e8e9a;
            --accent: #ff0055;
            --accent-blue: #00f0ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Urbanist', sans-serif;
            color: var(--text);
        }

        body {
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- NAVBAR NAV --- */
        header {
            border-bottom: 1px solid var(--border);
            background: rgba(3, 3, 3, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-left .ai-btn {
            background: transparent;
            border: 1px solid var(--accent-blue);
            padding: 6px 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }
        .nav-left .ai-btn:hover {
            background: var(--accent-blue);
            color: #000;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
        }

        .nav-center .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 4px;
            text-decoration: none;
            cursor: pointer;
        }

        .nav-right {
            display: flex;
            gap: 20px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 18px;
            position: relative;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .icon-badge {
            background: var(--accent);
            font-size: 10px;
            font-family: 'Orbitron', sans-serif;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        main {
            flex: 1;
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .hero-section {
            text-align: center;
            margin-bottom: 50px;
        }
        .hero-section p {
            color: var(--text-muted);
            letter-spacing: 2px;
            font-size: 14px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* --- REJILLA DE PRODUCTOS --- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            border-color: #333344;
        }

        .card-img-container {
            width: 100%;
            aspect-ratio: 3/4;
            background: #111;
            position: relative;
            overflow: hidden;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        .product-card:hover .card-img {
            transform: scale(1.05);
        }

        .card-wishlist-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            z-index: 2;
            transition: background 0.3s;
        }
        .card-wishlist-btn:hover {
            background: rgba(255,0,85,0.2);
        }

        .card-info {
            padding: 15px;
        }
        .card-brand {
            font-size: 11px;
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-blue);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            gap: 10px;
        }
        .card-price {
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 16px;
        }

        /* --- PANELES LATERALES (Cesta / Deseos / Detalle) --- */
        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: var(--panel);
            border-left: 1px solid var(--border);
            z-index: 200;
            transition: right 0.4s ease;
            display: flex;
            flex-direction: column;
            padding: 30px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        .sidebar.open {
            right: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }
        .sidebar-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            letter-spacing: 1px;
        }
        .close-btn {
            background: transparent;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-item {
            display: flex;
            gap: 15px;
            background: rgba(255,255,255,0.02);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }
        .sidebar-item img {
            width: 70px;
            aspect-ratio: 3/4;
            object-fit: cover;
            border-radius: 4px;
        }
        .item-details {
            flex: 1;
        }
        .item-actions {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .action-link {
            font-size: 11px;
            background: transparent;
            border: none;
            text-decoration: underline;
            cursor: pointer;
            color: var(--text-muted);
        }
        .action-link:hover { color: var(--text); }

        .sidebar-footer {
            border-top: 1px solid var(--border);
            padding-top: 20px;
            margin-top: 15px;
        }

        .total-box {
            display: flex;
            justify-content: space-between;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .checkout-btn {
            width: 100%;
            background: var(--text);
            color: #000;
            border: none;
            padding: 14px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1px;
            cursor: not-allowed;
            text-transform: uppercase;
        }

        /* --- DETALLE DE PRODUCTO AMPLIADO --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(3,3,3,0.9);
            backdrop-filter: blur(5px);
            z-index: 250;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal.open { opacity: 1; pointer-events: auto; }

        .modal-body {
            background: var(--panel);
            border: 1px solid var(--border);
            max-width: 850px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 8px;
            position: relative;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        @media (max-width: 768px) {
            .modal-body { grid-template-columns: 1fr; }
        }

        .modal-gallery {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .main-modal-img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            border-radius: 4px;
        }
        .thumbs-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
        }
        .thumb-img {
            width: 60px; aspect-ratio: 3/4; object-fit: cover; cursor: pointer; opacity: 0.6; border-radius: 2px;
        }
        .thumb-img:hover, .thumb-img.active { opacity: 1; border: 1px solid var(--accent-blue); }

        .modal-info {
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .modal-info h2 { font-size: 24px; margin-bottom: 10px; font-weight: 700; }
        .modal-price { font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--accent-blue); margin-bottom: 20px; }
        .modal-desc { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 25px; }
        .modal-specs { font-size: 13px; margin-bottom: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .spec-item span { color: var(--text-muted); }
        
        .add-to-cart-btn {
            background: transparent;
            border: 2px solid var(--text);
            padding: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .add-to-cart-btn:hover { background: var(--text); color: #000; }

        .close-modal {
            position: absolute;
            top: 15px; right: 20px;
            background: transparent; border: none; font-size: 28px; cursor: pointer; z-index: 10;
        }

        /* --- PANEL DE ADMIN OCULTO (010822) --- */
        #admin-panel {
            position: fixed;
            bottom: 20px; left: 20px;
            background: #000; border: 2px solid var(--accent);
            padding: 25px; width: 350px; border-radius: 8px;
            z-index: 300; display: none;
            box-shadow: 0 0 20px rgba(255,0,85,0.2);
        }
        #admin-panel h3 { font-family: 'Orbitron', sans-serif; color: var(--accent); margin-bottom: 15px; font-size: 14px; letter-spacing: 1px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; background: #111; border: 1px solid var(--border); padding: 8px; font-size: 13px;
        }
        .form-group textarea { resize: none; height: 50px; }
        .admin-btn {
            width: 100%; background: var(--accent); border: none; padding: 10px; font-family: 'Orbitron', sans-serif; font-weight: bold; font-size: 12px; cursor: pointer; margin-top: 5px;
        }

        /* --- FOOTER --- */
        footer {
            border-top: 1px solid var(--border);
            padding: 30px;
            text-align: center;
            background: var(--panel);
            margin-top: auto;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .footer-links a {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
        }
        .footer-links a:hover { color: var(--text); }
        .footer-copy { font-size: 11px; font-family: 'Orbitron', sans-serif; color: #444; }
    </style>
</head>
<body>

    <header>
        <div class="nav-left">
            <button class="ai-btn" onclick="alert('STUDIO M AI: Próximamente...')">STUDIO M AI</button>
        </div>
        <div class="nav-center">
            <a href="index.html" class="logo">STUDIO M</a>
        </div>
        <div class="nav-right">
            <button class="icon-btn" onclick="toggleSidebar('wishlist')">🖤 <span class="icon-badge" id="wishlist-count">0</span></button>
            <button class="icon-btn" onclick="toggleSidebar('cart')">🛒 <span class="icon-badge" id="cart-count">0</span></button>
        </div>
    </header>

    <main>
        <div class="hero-section">
            <p>Underground Archive // Curated Streetwear Drops</p>
        </div>
        <div class="products-grid" id="products-container">
            </div>
    </main>

    <div class="sidebar" id="cart-sidebar">
        <div class="sidebar-header">
            <h2>TU CESTA</h2>
            <button class="close-btn" onclick="toggleSidebar('cart')">&times;</button>
        </div>
        <div class="sidebar-content" id="cart-items"></div>
        <div class="sidebar-footer">
            <div class="total-box"><span>TOTAL:</span><span id="cart-total">0.00€</span></div>
            <button class="checkout-btn">Proceder al pago (€)</button>
        </div>
    </div>

    <div class="sidebar" id="wishlist-sidebar">
        <div class="sidebar-header">
            <h2>LISTA DE DESEOS</h2>
            <button class="close-btn" onclick="toggleSidebar('wishlist')">&times;</button>
        </div>
        <div class="sidebar-content" id="wishlist-items"></div>
    </div>

    <div class="modal" id="product-modal">
        <button class="close-modal" onclick="closeProductModal()">&times;</button>
        <div class="modal-body" id="modal-container">
            </div>
    </div>

    <div id="admin-panel">
        <h3>CONTROLES DE INVENTARIO</h3>
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="p-name" placeholder="Ej: Nike Dunk Low Trapstar">
        </div>
        <div class="form-group">
            <label>Descripción</label>
            <textarea id="p-desc" placeholder="Detalles de la prenda..."></textarea>
        </div>
        <div class="form-group">
            <label>URLs Imágenes (Separadas por comas)</label>
            <input type="text" id="p-imgs" placeholder="http://enlace1.jpg, http://enlace2.jpg">
        </div>
        <div class="form-group">
            <label>Marca</label>
            <input type="text" id="p-brand" placeholder="Ej: Nike, Corteiz">
        </div>
        <div class="form-group">
            <label>Estado</label>
            <select id="p-status">
                <option value="Nuevo (Deadstock)">Nuevo (Deadstock)</option>
                <option value="Excelente estado">Excelente estado</option>
                <option value="Muy buen estado">Muy buen estado</option>
                <option value="Usado / Vintage">Usado / Vintage</option>
            </select>
        </div>
        <div class="form-group" style="display: flex; gap: 10px;">
            <div>
                <label>Talla</label>
                <input type="text" id="p-size" placeholder="L, 42.5">
            </div>
            <div>
                <label>Cantidad</label>
                <input type="number" id="p-qty" value="1">
            </div>
            <div>
                <label>Precio (€)</label>
                <input type="number" id="p-price" placeholder="180">
            </div>
        </div>
        <button class="admin-btn" onclick="addCustomProduct()">Publicar Drop</button>
    </div>

    <footer>
        <div class="footer-links">
            <a href="pf.html">Preguntas Frecuentes</a>
            <a href="c.html">Contacto</a>
            <a href="tyc.html">Términos y Condiciones</a>
            <a href="pyc.html">Privacidad y Cookies</a>
        </div>
        <div class="footer-copy">© 2026 STUDIO M LOGISTICS S.L. ALL RIGHTS RESERVED.</div>
    </footer>

    <script>
        let products = JSON.parse(localStorage.getItem('sm_products')) || [];
        let cart = JSON.parse(localStorage.getItem('sm_cart')) || [];
        let wishlist = JSON.parse(localStorage.getItem('sm_wishlist')) || [];

        // Inicializar renderizado
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            updateCounters();
        });

        // Escuchar el código secreto de administrador "010822"
        let keyBuffer = "";
        window.addEventListener('keydown', (e) => {
            keyBuffer += e.key;
            if(keyBuffer.length > 6) keyBuffer = keyBuffer.substring(keyBuffer.length - 6);
            if(keyBuffer === "010822") {
                const panel = document.getElementById('admin-panel');
                panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
                alert('Matriz de Administración Abierta.');
            }
        });

        // Añadir producto desde panel de administración
        function addCustomProduct() {
            const name = document.getElementById('p-name').value;
            const desc = document.getElementById('p-desc').value;
            const imgsInput = document.getElementById('p-imgs').value;
            const brand = document.getElementById('p-brand').value;
            const status = document.getElementById('p-status').value;
            const size = document.getElementById('p-size').value;
            const qty = document.getElementById('p-qty').value;
            const price = document.getElementById('p-price').value;

            if(!name || !price || !imgsInput) {
                alert('Mínimo se requiere Nombre, Precio e Imágenes.');
                return;
            }

            const imgArray = imgsInput.split(',').map(url => url.trim());

            const newProduct = {
                id: Date.now(),
                name, desc, brand, status, size, qty: parseInt(qty), price: parseFloat(price),
                images: imgArray
            };

            products.push(newProduct);
            localStorage.setItem('sm_products', JSON.stringify(products));
            renderProducts();
            
            // Limpiar inputs
            document.getElementById('p-name').value = '';
            document.getElementById('p-desc').value = '';
            document.getElementById('p-imgs').value = '';
            document.getElementById('p-brand').value = '';
            document.getElementById('p-size').value = '';
            document.getElementById('p-price').value = '';
        }

        // Eliminar producto del inventario global
        function deleteProduct(id) {
            products = products.filter(p => p.id !== id);
            localStorage.setItem('sm_products', JSON.stringify(products));
            renderProducts();
        }

        // Renderizar catálogo
        function renderProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            if(products.length === 0) {
                container.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color: #555; padding: 40px;">No hay drops activos en el archivo. Usa el código secreto para añadir.</p>`;
                return;
            }

            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => openProductModal(p.id);

                card.innerHTML = `
                    <div class="card-img-container">
                        <img class="card-img" src="${p.images[0]}" alt="${p.name}">
                        <button class="card-wishlist-btn" onclick="event.stopPropagation(); toggleWishlist(${p.id})">🖤</button>
                    </div>
                    <div class="card-info">
                        <div class="card-brand">${p.brand || 'ARCHIVE'}</div>
                        <div class="card-title">${p.name}</div>
                        <div class="card-meta">
                            <span>Condición: ${p.status}</span>
                            <span>Talla: ${p.size}</span>
                        </div>
                        <div class="card-price">${p.price.toFixed(2)}€</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Sidebars Toggle
        function toggleSidebar(type) {
            document.getElementById('cart-sidebar').classList.remove('open');
            document.getElementById('wishlist-sidebar').classList.remove('open');
            if(type === 'cart') {
                document.getElementById('cart-sidebar').classList.toggle('open');
                renderCart();
            } else if(type === 'wishlist') {
                document.getElementById('wishlist-sidebar').classList.toggle('open');
                renderWishlist();
            }
        }

        // Carrito / Cesta Logic
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if(!product) return;
            if(!cart.some(item => item.id === id)) {
                cart.push(product);
                localStorage.setItem('sm_cart', JSON.stringify(cart));
                updateCounters();
            }
            closeProductModal();
            toggleSidebar('cart');
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            localStorage.setItem('sm_cart', JSON.stringify(cart));
            updateCounters();
            renderCart();
        }

        function moveFromCartToWishlist(id) {
            const item = cart.find(c => c.id === id);
            removeFromCart(id);
            if(item && !wishlist.some(w => w.id === id)) {
                wishlist.push(item);
                localStorage.setItem('sm_wishlist', JSON.stringify(wishlist));
                updateCounters();
            }
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0;

            cart.forEach(item => {
                total += item.price;
                const div = document.createElement('div');
                div.className = 'sidebar-item';
                div.innerHTML = `
                    <img src="${item.images[0]}">
                    <div class="item-details">
                        <h4>${item.name}</h4>
                        <p style="font-size:12px; color:var(--text-muted)">${item.price.toFixed(2)}€ - Talla ${item.size}</p>
                        <div class="item-actions">
                            <button class="action-link" onclick="removeFromCart(${item.id})">Eliminar</button>
                            <button class="action-link" onclick="moveFromCartToWishlist(${item.id})">Mover a Favoritos</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
            document.getElementById('cart-total').innerText = total.toFixed(2) + '€';
        }

        // Wishlist Logic
        function toggleWishlist(id) {
            const product = products.find(p => p.id === id);
            if(!product) return;
            if(wishlist.some(w => w.id === id)) {
                wishlist = wishlist.filter(w => w.id !== id);
            } else {
                wishlist.push(product);
            }
            localStorage.setItem('sm_wishlist', JSON.stringify(wishlist));
            updateCounters();
            if(document.getElementById('wishlist-sidebar').classList.contains('open')) renderWishlist();
        }

        function addWishlistItemToCart(id) {
            const item = wishlist.find(w => w.id === id);
            if(item) {
                wishlist = wishlist.filter(w => w.id !== id);
                localStorage.setItem('sm_wishlist', JSON.stringify(wishlist));
                if(!cart.some(c => c.id === id)) cart.push(item);
                localStorage.setItem('sm_cart', JSON.stringify(cart));
                updateCounters();
                renderWishlist();
            }
        }

        function renderWishlist() {
            const container = document.getElementById('wishlist-items');
            container.innerHTML = '';

            wishlist.forEach(item => {
                const div = document.createElement('div');
                div.className = 'sidebar-item';
                div.innerHTML = `
                    <img src="${item.images[0]}">
                    <div class="item-details">
                        <h4>${item.name}</h4>
                        <p style="font-size:12px; color:var(--text-muted)">${item.price.toFixed(2)}€</p>
                        <div class="item-actions">
                            <button class="action-link" onclick="toggleWishlist(${item.id})">Quitar</button>
                            <button class="action-link" onclick="addWishlistItemToCart(${item.id})">Añadir a la cesta</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function updateCounters() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('wishlist-count').innerText = wishlist.length;
        }

        // Modales de Detalle Expandido
        function openProductModal(id) {
            const product = products.find(p => p.id === id);
            if(!product) return;

            const modal = document.getElementById('product-modal');
            const container = document.getElementById('modal-container');

            let thumbsHTML = product.images.map((img, index) => 
                `<img class="thumb-img ${index===0?'active':''}" src="${img}" onclick="switchModalImg(this, '${img}')">`
            ).join('');

            container.innerHTML = `
                <div class="modal-gallery">
                    <img id="modal-main-view" class="main-modal-img" src="${product.images[0]}">
                    <div class="thumbs-container">${thumbsHTML}</div>
                </div>
                <div class="modal-info">
                    <h2>${product.name}</h2>
                    <div class="modal-price">${product.price.toFixed(2)}€</div>
                    <p class="modal-desc">${product.desc || 'Sin descripción adicional para este drop de archivo.'}</p>
                    <div class="modal-specs">
                        <div class="spec-item"><span>Marca:</span> ${product.brand}</div>
                        <div class="spec-item"><span>Estado:</span> ${product.status}</div>
                        <div class="spec-item"><span>Talla disponible:</span> ${product.size}</div>
                        <div class="spec-item"><span>Stock:</span> ${product.qty} u.</div>
                    </div>
                    <button class="add-to-cart-btn" onclick="addToCart(${product.id})">Añadir al Carrito</button>
                    <button class="action-link" style="margin-top:15px; color:var(--accent); text-align:left;" onclick="if(confirm('¿Eliminar permanentemente este drop?')) { deleteProduct(${product.id}); closeProductModal(); }">Borrar del Inventario (Admin)</button>
                </div>
            `;
            modal.classList.add('open');
        }

        function closeProductModal() {
            document.getElementById('product-modal').classList.remove('open');
        }

        function switchModalImg(element, src) {
            document.getElementById('modal-main-view').src = src;
            document.querySelectorAll('.thumb-img').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
